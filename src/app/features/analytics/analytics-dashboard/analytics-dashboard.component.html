<div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200/60 space-y-4">
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
    <div>
      <h3 class="text-base font-bold text-slate-800">Weekly Emotional Well-being Trend</h3>
      <p class="text-xs text-slate-400">Aggregated reflection insights generated over your selected tracking window.</p>
    </div>
    
    <div class="flex items-center bg-slate-100 p-1 rounded-xl self-start sm:self-center border border-slate-200/40">
      <button 
        (click)="changeTimeframe('3d')"
        [class]="activeFilter === '3d' ? 'bg-white text-slate-900 shadow-xs font-semibold' : 'text-slate-500 hover:text-slate-800 font-medium'"
        class="px-3 py-1.5 text-xs rounded-lg transition-all duration-200 select-none">
        3 Days
      </button>
      <button 
        (click)="changeTimeframe('7d')"
        [class]="activeFilter === '7d' ? 'bg-white text-slate-900 shadow-xs font-semibold' : 'text-slate-500 hover:text-slate-800 font-medium'"
        class="px-3 py-1.5 text-xs rounded-lg transition-all duration-200 select-none">
        7 Days
      </button>
      <button 
        (click)="changeTimeframe('14d')"
        [class]="activeFilter === '14d' ? 'bg-white text-slate-900 shadow-xs font-semibold' : 'text-slate-500 hover:text-slate-800 font-medium'"
        class="px-3 py-1.5 text-xs rounded-lg transition-all duration-200 select-none">
        14 Days
      </button>
      <button 
        (click)="changeTimeframe('1m')"
        [class]="activeFilter === '1m' ? 'bg-white text-slate-900 shadow-xs font-semibold' : 'text-slate-500 hover:text-slate-800 font-medium'"
        class="px-3 py-1.5 text-xs rounded-lg transition-all duration-200 select-none">
        1 Month
      </button>
    </div>
  </div>

  <div class="relative w-full h-64 sm:h-72">
    <canvas #trendChart></canvas>
  </div>
</div>
