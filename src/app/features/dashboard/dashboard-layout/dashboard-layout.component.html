<div class="min-h-screen bg-slate-100 flex flex-col">
  
  <header class="w-full bg-slate-900 text-white shadow-md border-b border-slate-800 shrink-0 select-none">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      
      <div class="flex items-center space-x-2">
        <h2 class="text-xl font-bold tracking-wider text-wellness-primary">UJIYAR</h2>
        <span class="hidden sm:inline-block text-[10px] bg-slate-800 text-slate-400 font-semibold px-2 py-0.5 rounded border border-slate-700/60">
          v1.0.0 Proto
        </span>
      </div>
      
      <nav class="flex items-center space-x-1 md:space-x-2">
        <a routerLink="/dashboard" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>🏠 Overview</span>
        </a>

        <a routerLink="/dashboard/community" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>👥 Community</span>
        </a>

        <a routerLink="/dashboard/therapist-finder" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>⛑️ Support</span>
        </a>
        
        <a routerLink="/dashboard/ai-companion" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>🤖 AI Coach</span>
        </a>
      </nav>

      <div class="flex items-center space-x-4">
        <a routerLink="/auth/login" class="text-xs font-semibold text-slate-400 hover:text-slate-200 hidden md:inline-block transition">
          Sign Out
        </a>
        <div class="h-8 w-8 rounded-full bg-wellness-primary/20 flex items-center justify-center text-wellness-dark font-bold text-sm">
          U
        </div>
      </div>

    </div>
  </header>

  <main class="flex-1 overflow-y-auto">
    <div class="max-w-7xl mx-auto p-6 md:p-8 animate-fade-in">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
