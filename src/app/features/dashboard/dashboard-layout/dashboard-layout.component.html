<div class="min-h-screen bg-slate-100 flex flex-col">
  
  <header class="w-full bg-slate-900 text-white shadow-md border-b border-slate-800 shrink-0 select-none z-50">
    <div class="max-w-7xl mx-auto px-6 h-16 flex items-center justify-between">
      
      <div class="flex items-center space-x-2">
        <h2 class="text-xl font-bold tracking-wider text-wellness-primary">UJIYAR</h2>
        <span class="hidden sm:inline-block text-[10px] bg-slate-800 text-slate-400 font-semibold px-2 py-0.5 rounded border border-slate-700/60">
          v1.0.0 Proto
        </span>
      </div>
      
      <nav class="flex items-center space-x-1 md:space-x-2">
        <a routerLink="/dashboard" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>🏠 Overview</span>
        </a>

        <a routerLink="/dashboard/community" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>👥 Community</span>
        </a>

        <a routerLink="/dashboard/therapist-finder" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>⛑️ Support</span>
        </a>
        
        <a routerLink="/dashboard/ai-companion" routerLinkActive="bg-wellness-primary/20 text-wellness-primary font-semibold" class="flex items-center space-x-2 px-3 py-2 rounded-xl text-slate-300 hover:bg-slate-800 hover:text-white transition text-xs md:text-sm">
          <span>🤖 AI Coach</span>
        </a>
      </nav>

      <div class="relative">
        <button 
          (click)="toggleProfileMenu()"
          type="button"
          class="h-9 w-9 rounded-full bg-emerald-400 text-slate-950 font-bold text-sm cursor-pointer hover:ring-2 hover:ring-emerald-300 transition focus:outline-none select-none shadow-sm flex items-center justify-center">
          U
        </button>

        <div 
          *ngIf="isProfileMenuOpen"
          class="absolute right-0 mt-2 w-56 bg-white rounded-xl shadow-xl border border-slate-200/80 text-slate-700 py-2 animate-fade-in z-50">
          
          <div class="px-4 py-2 border-b border-slate-100 mb-1">
            <p class="text-xs font-bold text-slate-800">Active Session</p>
            <p class="text-[11px] text-slate-400 font-medium truncate">user&#64;ujiyar-workspace.org</p>
          </div>

          <a routerLink="/dashboard" (click)="closeProfileMenu()" class="flex items-center space-x-3 px-4 py-2 text-xs hover:bg-slate-50 font-medium transition text-slate-600 hover:text-slate-900">
            <span>👤</span> <span>My Profile Space</span>
          </a>

          <a routerLink="/dashboard" (click)="closeProfileMenu()" class="flex items-center space-x-3 px-4 py-2 text-xs hover:bg-slate-50 font-medium transition text-slate-600 hover:text-slate-900">
            <span>⚙️</span> <span>Account Settings</span>
          </a>

          <a routerLink="/dashboard" (click)="closeProfileMenu()" class="flex items-center space-x-3 px-4 py-2 text-xs hover:bg-slate-50 font-medium transition text-slate-600 hover:text-slate-900">
            <span>🛡️</span> <span>Privacy & Security</span>
          </a>

          <div class="border-t border-slate-100 mt-2 pt-1">
            <a routerLink="/auth/login" (click)="closeProfileMenu()" class="flex items-center space-x-3 px-4 py-2.5 text-xs hover:bg-rose-50 font-semibold text-rose-600 rounded-b-xl transition">
              <span>🚪</span> <span>Sign Out</span>
            </a>
          </div>

        </div>
      </div>

    </div>
  </header>

  <div *ngIf="isProfileMenuOpen" (click)="closeProfileMenu()" class="fixed inset-0 z-40 bg-transparent"></div>

  <main class="flex-1 overflow-y-auto z-10">
    <div class="max-w-7xl mx-auto p-6 md:p-8">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
