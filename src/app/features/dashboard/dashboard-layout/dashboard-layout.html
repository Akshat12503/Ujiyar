<div class="flex h-screen bg-slate-100 overflow-hidden">
  <aside class="w-64 bg-slate-900 text-white flex flex-col shadow-xl">
    <div class="p-6 border-b border-slate-800">
      <h2 class="text-xl font-bold tracking-wider text-wellness-primary">UJIYAR</h2>
      <p class="text-xs text-slate-400 mt-0.5">Wellness Workspace</p>
    </div>
    
    <nav class="flex-1 p-4 space-y-2">
      <a routerLink="/dashboard" routerLinkActive="bg-wellness-primary/20 text-wellness-primary" [routerLinkActiveOptions]="{exact: true}" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 transition text-sm font-medium">
        <span>🏠 Dashboard Overview</span>
      </a>
      <a routerLink="/auth/login" class="flex items-center space-x-3 px-4 py-2.5 rounded-xl hover:bg-slate-800 text-slate-400 transition text-sm font-medium">
        <span>🔑 Back to Login</span>
      </a>
    </nav>
    
    <div class="p-4 border-t border-slate-800 text-xs text-slate-500 text-center">
      v1.0.0 Prototyping Mode
    </div>
  </aside>

  <main class="flex-1 flex flex-col overflow-y-auto">
    <header class="bg-white h-16 shadow-sm border-b border-slate-200 flex items-center justify-between px-8">
      <h1 class="text-lg font-semibold text-slate-700">Welcome Back, User</h1>
      <div class="h-8 w-8 rounded-full bg-wellness-primary/20 flex items-center justify-center text-wellness-dark font-bold text-sm">
        U
      </div>
    </header>
    
    <div class="p-8">
      <router-outlet></router-outlet>
    </div>
  </main>
</div>
