<div class="chat-container">
  
  <div class="sidebar">
    <h3>Safe Rooms</h3>
    <ul>
      <li *ngFor="let room of safeRooms" 
          [class.active]="room.id === activeRoom.id"
          (click)="switchRoom(room)">
        {{ room.name }}
      </li>
    </ul>
  </div>

  <div class="chat-main">
    
    <div class="chat-header">
      <h2>{{ activeRoom.name }}</h2>
    </div>

    <div class="system-warning" *ngIf="systemWarning">
      ⚠️ {{ systemWarning }}
    </div>

    <div class="message-list">
      <div *ngFor="let msg of messages" 
           class="message-wrapper"
           [class.my-message]="msg.sender === currentUser?.displayName || (isGhostMode && msg.isAnonymous)">
        
        <div class="message-bubble">
          <span class="sender-name">{{ msg.sender }}</span>
          <p class="message-content">{{ msg.content }}</p>
          <span class="message-time">{{ msg.createdAt | date:'shortTime' }}</span>
        </div>
      </div>
      <div *ngIf="messages.length === 0" class="empty-state">
        This room is quiet right now. Be the first to share.
      </div>
    </div>

    <div class="chat-input-area">
      <div class="ghost-mode-toggle">
        <label>
          <input type="checkbox" [(ngModel)]="isGhostMode"> 
          👻 Ghost Mode (Anonymous)
        </label>
      </div>
      
      <div class="input-row">
        <input type="text" 
               [(ngModel)]="newMessage" 
               (keyup.enter)="sendMessage()"
               placeholder="Type a message..." />
        <button (click)="sendMessage()">Send</button>
      </div>
    </div>

  </div>
</div>
