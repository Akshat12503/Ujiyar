<div class="min-h-screen bg-[#FAF8F3] dark:bg-[#1E2528] flex flex-col transition-colors duration-500">

  <header class="w-full bg-white/90 dark:bg-[#252D31]/90 backdrop-blur-md border-b border-[#37474F]/8 dark:border-white/8 shrink-0 select-none z-50 sticky top-0">
    <div class="max-w-7xl mx-auto px-6 h-18 py-3 flex items-center justify-between">

      <div class="flex items-center gap-2.5">
        <div class="h-9 w-9 rounded-xl bg-[#A8C5A0]/20 flex items-center justify-center text-lg">🌿</div>
        <h2 class="text-xl font-bold tracking-tight text-[#37474F] dark:text-[#E5E9EA]">Solace</h2>
        <span class="hidden sm:inline-block text-[10px] bg-[#FAF8F3] dark:bg-white/5 text-[#6B7A80] dark:text-[#9BA8AC] font-semibold px-2 py-0.5 rounded-lg border border-[#37474F]/8 dark:border-white/10">
          v1.0.0
        </span>
      </div>

      <nav class="hidden md:flex items-center gap-1 bg-[#FAF8F3] dark:bg-white/5 p-1 rounded-2xl border border-[#37474F]/5 dark:border-white/8">
        <a routerLink="/dashboard" routerLinkActive="bg-white dark:bg-[#37474F] text-[#37474F] dark:text-white shadow-sm font-semibold" [routerLinkActiveOptions]="{exact: true}" class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-[#6B7A80] dark:text-[#9BA8AC] hover:text-[#37474F] dark:hover:text-white transition-all duration-300 text-sm">
          <span>Overview</span>
        </a>

        <a routerLink="/dashboard/community" routerLinkActive="bg-white dark:bg-[#37474F] text-[#37474F] dark:text-white shadow-sm font-semibold" class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-[#6B7A80] dark:text-[#9BA8AC] hover:text-[#37474F] dark:hover:text-white transition-all duration-300 text-sm">
          <span>Community</span>
        </a>

        <a routerLink="/dashboard/therapist-finder" routerLinkActive="bg-white dark:bg-[#37474F] text-[#37474F] dark:text-white shadow-sm font-semibold" class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-[#6B7A80] dark:text-[#9BA8AC] hover:text-[#37474F] dark:hover:text-white transition-all duration-300 text-sm">
          <span>Support</span>
        </a>

        <a routerLink="/dashboard/ai-companion" routerLinkActive="bg-white dark:bg-[#37474F] text-[#37474F] dark:text-white shadow-sm font-semibold" class="flex items-center gap-1.5 px-4 py-2 rounded-xl text-[#6B7A80] dark:text-[#9BA8AC] hover:text-[#37474F] dark:hover:text-white transition-all duration-300 text-sm">
          <span>Companion</span>
        </a>
      </nav>

      <div class="flex items-center gap-3">
        <button
          (click)="theme.toggle()"
          type="button"
          class="h-10 w-10 rounded-full bg-[#FAF8F3] dark:bg-white/10 hover:bg-[#A8C5A0]/15 dark:hover:bg-white/15 transition-all duration-300 flex items-center justify-center text-lg focus:outline-none"
          title="Toggle theme">
          <span *ngIf="!theme.isDark()">🌙</span>
          <span *ngIf="theme.isDark()">☀️</span>
        </button>

        <div class="relative">
          <button
            (click)="toggleProfileMenu()"
            type="button"
            class="h-10 w-10 rounded-full bg-[#A8C5A0] text-white font-semibold text-sm cursor-pointer hover:ring-4 hover:ring-[#A8C5A0]/20 transition-all duration-300 focus:outline-none select-none shadow-sm flex items-center justify-center">
            U
          </button>

          <div
            *ngIf="isProfileMenuOpen"
            class="absolute right-0 mt-3 w-60 bg-white dark:bg-[#252D31] rounded-2xl shadow-xl border border-[#37474F]/8 dark:border-white/10 text-[#37474F] dark:text-[#E5E9EA] py-2 animate-fade-up z-50">

            <div class="px-4 py-2.5 border-b border-[#37474F]/6 dark:border-white/8 mb-1">
              <p class="text-xs font-semibold text-[#37474F] dark:text-[#E5E9EA]">Active Session</p>
              <p class="text-[11px] text-[#6B7A80] dark:text-[#9BA8AC] font-medium truncate mt-0.5">user&#64;solace-workspace.org</p>
            </div>

            <a routerLink="/dashboard" (click)="closeProfileMenu()" class="flex items-center gap-3 px-4 py-2.5 text-xs hover:bg-[#FAF8F3] dark:hover:bg-white/5 font-medium transition-colors duration-200 text-[#6B7A80] dark:text-[#9BA8AC] hover:text-[#37474F] dark:hover:text-white">
              <span>👤</span> <span>My Profile</span>
            </a>

            <a routerLink="/dashboard" (click)="closeProfileMenu()" class="flex items-center gap-3 px-4 py-2.5 text-xs hover:bg-[#FAF8F3] dark:hover:bg-white/5 font-medium transition-colors duration-200 text-[#6B7A80] dark:text-[#9BA8AC] hover:text-[#37474F] dark:hover:text-white">
              <span>⚙️</span> <span>Account Settings</span>
            </a>

            <a routerLink="/dashboard" (click)="closeProfileMenu()" class="flex items-center gap-3 px-4 py-2.5 text-xs hover:bg-[#FAF8F3] dark:hover:bg-white/5 font-medium transition-colors duration-200 text-[#6B7A80] dark:text-[#9BA8AC] hover:text-[#37474F] dark:hover:text-white">
              <span>🛡️</span> <span>Privacy &amp; Security</span>
            </a>

            <div class="border-t border-[#37474F]/6 dark:border-white/8 mt-1 pt-1">
              <a routerLink="/auth/login" (click)="closeProfileMenu()" class="flex items-center gap-3 px-4 py-2.5 text-xs hover:bg-rose-50 dark:hover:bg-rose-500/10 font-semibold text-rose-500 rounded-b-xl transition-colors duration-200">
                <span>🚪</span> <span>Sign Out</span>
              </a>
            </div>

          </div>
        </div>
      </div>

    </div>
  </header>

  <div *ngIf="isProfileMenuOpen" (click)="closeProfileMenu()" class="fixed inset-0 z-40 bg-transparent"></div>

  <main class="flex-1 overflow-y-auto z-10">
    <div class="max-w-7xl mx-auto p-6 md:p-8">
      <router-outlet></router-outlet>
    </div>
  </main>

</div>
