<div class="flex flex-col h-[calc(100vh-12rem)] bg-white rounded-2xl shadow-sm border border-slate-200/60 overflow-hidden">
  
  <div class="p-4 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
    <div class="flex items-center space-x-3">
      <div class="h-10 w-10 rounded-xl bg-wellness-primary/10 flex items-center justify-center text-wellness-primary text-xl">
        🤖
      </div>
      <div>
        <h3 class="text-sm font-bold text-slate-800">AI Wellness Companion</h3>
        <p class="text-[11px] text-emerald-600 flex items-center font-medium">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 mr-1.5 animate-pulse"></span>
          Ready to listen
        </p>
      </div>
    </div>
    <span class="text-[10px] bg-slate-100 font-semibold px-2.5 py-1 text-slate-500 rounded-lg">Safe Reflection Zone</span>
  </div>

  <div class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50/30">
    <div *ngFor="let msg of messages" 
         [class]="msg.sender === 'user' ? 'justify-end' : 'justify-start'" 
         class="flex items-start gap-3 max-w-full">
      
      <div *ngIf="msg.sender === 'ai'" class="h-8 w-8 rounded-lg bg-wellness-primary/10 flex items-center justify-center text-sm shrink-0">
        🤖
      </div>

      <div [class]="msg.sender === 'user' ? 'bg-slate-900 text-white rounded-br-none' : 'bg-white border border-slate-200/80 text-slate-700 rounded-bl-none'"
           class="p-3.5 rounded-2xl max-w-lg shadow-xs text-sm leading-relaxed break-words">
        <p>{{ msg.text }}</p>
        <span [class]="msg.sender === 'user' ? 'text-slate-400' : 'text-slate-400'" 
              class="block text-[9px] mt-1 text-right font-medium">
          {{ msg.timestamp | date:'shortTime' }}
        </span>
      </div>
    </div>

    <div *ngIf="isAiTyping" class="flex items-center gap-3 justify-start animate-pulse">
      <div class="h-8 w-8 rounded-lg bg-wellness-primary/10 flex items-center justify-center text-sm">🤖</div>
      <div class="bg-white border border-slate-100 p-4 rounded-2xl rounded-bl-none flex items-center space-x-1">
        <span class="h-1.5 w-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 0ms"></span>
        <span class="h-1.5 w-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 150ms"></span>
        <span class="h-1.5 w-1.5 bg-slate-400 rounded-full animate-bounce" style="animation-delay: 300ms"></span>
      </div>
    </div>
  </div>

  <div class="p-4 border-t border-slate-100 bg-white space-y-3">
    
    <div *ngIf="messages.length === 1" class="flex flex-wrap gap-2 animate-fade-in">
      <button 
        *ngFor="let prompt of starterPrompts"
        (click)="sendMessage(prompt)"
        class="text-xs bg-slate-50 hover:bg-slate-100 text-slate-600 px-3 py-2 rounded-xl border border-slate-200/60 transition-all text-left">
        ✨ "{{ prompt }}"
      </button>
    </div>

    <form (ngSubmit)="sendMessage()" class="flex items-center gap-3">
      
      <div class="relative flex-1">
        <input 
          type="text"
          [(ngModel)]="newMessageText"
          name="chatMessage"
          placeholder="Share what is on your mind safely..."
          autocomplete="off"
          class="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-wellness-primary/20 focus:border-wellness-primary text-slate-700 text-sm transition pr-12">
        
        <button 
          type="button"
          (click)="toggleVoiceRecognition()"
          class="absolute right-2 top-1/2 -translate-y-1/2 p-2 rounded-full transition-all duration-200 focus:outline-none"
          [class.text-red-500]="isRecording"
          [class.bg-red-50]="isRecording"
          [class.animate-pulse]="isRecording"
          [class.text-slate-400]="!isRecording"
          [class.hover:bg-slate-200]="!isRecording"
          [class.hover:text-slate-700]="!isRecording"
          title="Toggle voice dictation">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 18.75a6 6 0 0 0 6-6v-1.5m-6 7.5a6 6 0 0 1-6-6v-1.5m6 7.5v3.75m-3.75 0h7.5M12 15.75a3 3 0 0 1-3-3V4.5a3 3 0 1 1 6 0v8.25a3 3 0 0 1-3 3Z" />
          </svg>
        </button>
      </div>
      
      <button 
        type="submit"
        [disabled]="(!newMessageText.trim() && !isRecording) || isAiTyping"
        class="bg-slate-900 hover:bg-slate-800 disabled:opacity-30 text-white font-medium p-3 rounded-xl transition shadow-sm shrink-0 flex items-center justify-center">
        <span>🚀</span>
      </button>
    </form>
  </div>

</div>
