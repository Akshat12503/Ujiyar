<div class="space-y-6">
  <div class="text-center">
    <h2 class="text-2xl font-bold text-slate-800 tracking-tight">Join Solace</h2>
    <p class="text-slate-500 text-sm mt-1">Begin your collective journey to mental clarity.</p>
  </div>

  <form (ngSubmit)="onRegisterSubmit()" #registerForm="ngForm" class="space-y-4">
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Your Name</label>
      <input 
        type="text" 
        name="name"
        [(ngModel)]="registerData.name"
        required
        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-wellness-primary/20 focus:border-wellness-primary text-slate-700 transition text-sm"
        placeholder="Alex Mercer">
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Email Address</label>
      <input 
        type="email" 
        name="email"
        [(ngModel)]="registerData.email"
        required
        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-wellness-primary/20 focus:border-wellness-primary text-slate-700 transition text-sm"
        placeholder="name@example.com">
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider text-slate-500 mb-1">Password</label>
      <input 
        type="password" 
        name="password"
        [(ngModel)]="registerData.password"
        required
        class="w-full px-4 py-2.5 bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-wellness-primary/20 focus:border-wellness-primary text-slate-700 transition text-sm"
        placeholder="••••••••">
    </div>

    <button 
      type="submit"
      [disabled]="!registerForm.form.valid"
      class="w-full bg-slate-900 hover:bg-slate-800 disabled:opacity-50 text-white font-medium py-3 rounded-xl shadow-md transition-all text-sm mt-2">
      Create Account
    </button>
  </form>

  <div class="text-center border-t border-slate-100 pt-4 text-xs text-slate-500">
    Already have an account? 
    <a routerLink="/auth/login" class="text-wellness-primary font-semibold hover:underline">Sign in</a>
  </div>
</div>
