<div class="space-y-6">
  <div class="text-center">
    <h2 class="text-2xl font-bold text-[#37474F] dark:text-[#E5E9EA] tracking-tight">Welcome Back</h2>
    <p class="text-[#6B7A80] dark:text-[#9BA8AC] text-sm mt-1">Step back into your calm space.</p>
  </div>

  <form (ngSubmit)="onSubmit()" #loginForm="ngForm" class="space-y-4">
    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider text-[#6B7A80] dark:text-[#9BA8AC] mb-1.5">Email Address</label>
      <input
        type="email"
        name="email"
        [(ngModel)]="formData.email"
        required
        class="w-full px-4 py-3 bg-[#FAF8F3] dark:bg-white/5 border border-[#37474F]/10 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#A8C5A0]/30 focus:border-[#A8C5A0] text-[#37474F] dark:text-[#E5E9EA] transition-all duration-300 text-sm placeholder:text-[#6B7A80]/50 dark:placeholder:text-[#9BA8AC]/40"
        placeholder="name@example.com">
    </div>

    <div>
      <label class="block text-xs font-semibold uppercase tracking-wider text-[#6B7A80] dark:text-[#9BA8AC] mb-1.5">Password</label>
      <input
        type="password"
        name="password"
        [(ngModel)]="formData.password"
        required
        class="w-full px-4 py-3 bg-[#FAF8F3] dark:bg-white/5 border border-[#37474F]/10 dark:border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-[#A8C5A0]/30 focus:border-[#A8C5A0] text-[#37474F] dark:text-[#E5E9EA] transition-all duration-300 text-sm placeholder:text-[#6B7A80]/50 dark:placeholder:text-[#9BA8AC]/40"
        placeholder="••••••••">
    </div>

    <div *ngIf="errorMessage" class="text-rose-500 text-xs bg-rose-50 dark:bg-rose-500/10 px-4 py-2.5 rounded-xl">
      {{ errorMessage }}
    </div>

    <button
      type="submit"
      [disabled]="!loginForm.form.valid || isLoading"
      class="w-full bg-[#A8C5A0] hover:bg-[#8FB088] disabled:opacity-50 text-white font-semibold py-3.5 rounded-2xl shadow-sm transition-all duration-300 text-sm mt-2">
      <span *ngIf="!isLoading">Sign In</span>
      <span *ngIf="isLoading" class="flex items-center justify-center gap-2">
        <span class="h-1.5 w-1.5 rounded-full bg-white animate-breathe"></span>
        Verifying...
      </span>
    </button>
  </form>

  <div class="text-center border-t border-[#37474F]/5 dark:border-white/8 pt-4 text-xs text-[#6B7A80] dark:text-[#9BA8AC]">
    New to the community?
    <a routerLink="/auth/register" class="text-[#6FAFA8] font-semibold hover:underline">Create an account</a>
  </div>
</div>
